{% extends "movies/base.html" %}

{% block title %}Видалити фільм{% endblock %}

{% block content %}
    <section class="panel">
        <p class="eyebrow">Підтвердження</p>
        <h2>Видалити "{{ movie.title }}"?</h2>
        <p class="subtitle">
            Режисер: {{ movie.director }}. Оцінка: {{ movie.rating }}/10.
            Цю дію неможливо скасувати.
        </p>

        <form method="post" class="actions" style="margin-top: 20px;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Так, видалити</button>
            <a href="{% url 'movies:list' %}" class="btn btn-secondary">Ні, повернутись</a>
        </form>
    </section>
{% endblock %}
